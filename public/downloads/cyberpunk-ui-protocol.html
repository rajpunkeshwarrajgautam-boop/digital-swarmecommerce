<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Swarm | Protocol Delivery</title>
    <style>
        :root {
            --primary: #ff6b35;
            --accent: #a855f7;
            --black: #020202;
            --white: #ffffff;
        }
        body {
            background: var(--black);
            color: var(--white);
            font-family: 'Outfit', sans-serif;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
            text-transform: uppercase;
        }
        .container {
            border: 4px solid var(--white);
            padding: 4rem;
            position: relative;
            background: rgba(255,255,255,0.02);
            backdrop-filter: blur(20px);
            max-width: 600px;
            width: 90%;
            box-shadow: 20px 20px 0px rgba(255,255,255,0.1);
        }
        .header {
            font-weight: 900;
            font-style: italic;
            font-size: 3rem;
            letter-spacing: -2px;
            margin-bottom: 2rem;
            border-bottom: 2px solid rgba(255,255,255,0.1);
            padding-bottom: 1rem;
        }
        .header span {
            color: var(--white);
            text-shadow: 0 0 20px var(--primary);
        }
        .details {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.8rem;
            color: rgba(255,255,255,0.4);
            margin-bottom: 3rem;
            letter-spacing: 2px;
        }
        .access-btn {
            background: var(--white);
            color: var(--black);
            padding: 1.5rem 2rem;
            display: block;
            text-align: center;
            text-decoration: none;
            font-weight: 900;
            font-style: italic;
            font-size: 1.5rem;
            border: 4px solid var(--primary);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .access-btn:hover {
            background: var(--primary);
            color: var(--white);
            transform: translate(-4px, -4px);
            box-shadow: 8px 8px 0px var(--white);
        }
        .footer {
            margin-top: 3rem;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.7rem;
            opacity: 0.3;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">ASSET_<span>FORGE</span></div>
        <div class="details">
            NODE_ID: CYBERPUNK_UI_PRO<br>
            STATUS: AUTHORIZED_ACCESS<br>
            EXPIRY: PERPETUAL_LICENSE
        </div>
        <p style="font-size: 1.2rem; margin-bottom: 3rem; font-style: italic;">Your Cyberpunk UI Kit Pro is ready for extraction.</p>
        <a href="https://figma.com" class="access-btn">CONNECT_FIGMA_HUB</a>
        <div class="footer">
            SYSTEM_ID: DS_UI_TERMINAL // ENCRYPTED_DELIVERY_PROTOCOL
        </div>
    </div>
</body>
</html>
