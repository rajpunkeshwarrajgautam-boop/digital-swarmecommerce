name: Quality Gate

on:
  push:
    branches: [main]
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # Shared by build, `next start` (Lighthouse), and any step that needs app config.
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
      CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
      NEXT_PUBLIC_FB_PIXEL_ID: ${{ secrets.NEXT_PUBLIC_FB_PIXEL_ID }}
      NEXT_PUBLIC_GA_MEASUREMENT_ID: ${{ secrets.NEXT_PUBLIC_GA_MEASUREMENT_ID }}
      RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
      CASHFREE_APP_ID: ${{ secrets.CASHFREE_APP_ID }}
      CASHFREE_SECRET_KEY: ${{ secrets.CASHFREE_SECRET_KEY }}
      NEXT_PUBLIC_SITE_URL: https://digitalswarm.in
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium webkit

      - name: Build app
        run: npm run build

      - name: Verify GA script is present on production homepage
        env:
          PLAYWRIGHT_PRODUCTION_URL: https://digitalswarm.in
        run: |
          node -e "const expected='https://www.googletagmanager.com/gtag/js?id=G-RB0H8VHPS5'; fetch(process.env.PLAYWRIGHT_PRODUCTION_URL).then(r=>r.text()).then(html=>{ if(!html.includes(expected)){ throw new Error('Missing GA script URL: '+expected); } console.log('Verified GA script URL present:', expected); });"

      - name: E2E chromium
        run: npm run test:e2e:chromium
        env:
          PLAYWRIGHT_NO_WEBSERVER: "1"
          PLAYWRIGHT_PRODUCTION_URL: https://digitalswarm.in

      - name: E2E webkit
        run: npm run test:e2e:webkit
        env:
          PLAYWRIGHT_NO_WEBSERVER: "1"
          PLAYWRIGHT_PRODUCTION_URL: https://digitalswarm.in

      - name: Lighthouse CI
        run: npm run perf:lighthouse
